# biblio configuration (repo-local)
citekeys: "bib/config/citekeys.md"

pdf_root: "bib/articles"
pdf_pattern: "{citekey}/{citekey}.pdf"

out_root: "bib/derivatives/docling"

bibtex:
  merge:
    src_dir: "bib/srcbib"
    src_glob: "*.bib"
    out_bib: "bib/main.bib"
    file_field_mode: "drop"
    duplicates_log: "bib/logs/duplicate_bib_ids.txt"
