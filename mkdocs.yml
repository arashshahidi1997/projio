site_name: projio
site_description: Project knowledge orchestrator and MCP server for research repositories
site_url: https://arashshahidi1997.github.io/projio/
repo_url: https://github.com/arashshahidi1997/projio
repo_name: arashshahidi1997/projio

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - content.code.copy

extra:
  social:
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/projio/
      name: PyPI

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Home: index.md
  - Tutorials:
      - tutorials/index.md
      - Quickstart: tutorials/quickstart.md
      - Ecosystem Overview: tutorials/ecosystem-overview.md
      - Project Setup Workflow: tutorials/project-setup.md
      - Note-Driven Workflow: tutorials/note-workflow.md
      - Semantic Search Pipeline: tutorials/search-pipeline.md
      - Agent-Driven Ingestion: tutorials/agent-ingestion.md
      - Agent Orchestration: tutorials/agent-orchestration.md
      - Site & Docs Workflow: tutorials/site-workflow.md
  - How-To Guides:
      - how-to/index.md
      - Initialize A Workspace: how-to/init.md
      - Configure The MCP Server: how-to/mcp.md
      - Manage DataLad Siblings: how-to/siblings.md
      - Build The Documentation Site: how-to/site.md
  - Explanation:
      - explanation/index.md
      - Ecosystem: explanation/ecosystem.md
      - Ecosystem Architecture: explanation/architecture.md
      - Workspace Architecture: explanation/workspace-architecture.md
      - Package Integration: explanation/package-integration.md
      - Search Before Creation: explanation/search-before-creation.md
      - Agent Safety & Permissions: explanation/agent-safety.md
  - Reference:
      - reference/index.md
      - CLI: reference/cli.md
      - Workspace Layout: reference/workspace-layout.md
      - Configuration: reference/configuration.md
      - MCP Tools: reference/mcp-tools.md
  - Specs:
      - pipeio:
          - specs/pipeio/index.md
          - Overview: specs/pipeio/overview.md
          - Registry: specs/pipeio/registry.md
          - Flow Config: specs/pipeio/flow-config.md
          - Path Resolution: specs/pipeio/path-resolution.md
          - Notebook Lifecycle: specs/pipeio/notebook.md
          - Scaffolding: specs/pipeio/scaffolding.md
          - Contracts: specs/pipeio/contracts.md
          - CLI: specs/pipeio/cli.md
          - MCP Tools: specs/pipeio/mcp-tools.md
  - Log:
      - log/index.md
