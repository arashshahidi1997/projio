project_name: projio
project_kind: generic
push_sibling: github
description: ''
indexio:
  config: .projio/indexio/config.yaml
  persist_dir: .projio/index
biblio:
  enabled: true
  config: .projio/biblio/biblio.yml
notio:
  enabled: true
  notes_dir: docs/log/
codio:
  enabled: true
  catalog_path: .projio/codio/catalog.yml
  profiles_path: .projio/codio/profiles.yml
  notes_dir: docs/reference/codelib/libraries/
pipeio:
  enabled: false
  registry_path: .projio/pipeio/registry.yml
  pipelines_dir: code/pipelines
site:
  base_port: 8000
  host: 127.0.0.1
  chatbot:
    enabled: true
    backend_url: null
    host: 127.0.0.1
    port: 9100
    title: Docs Assistant
    storage_key: projio_chat_v1
helpers:
  sibling:
    github:
      sibling: github
      credential: github
      project_template: '{project_name}'
    gitlab:
      sibling: gitlab
      credential: gitlab
      project_template: '{project_name}'
    ria:
      sibling: origin
      alias_strategy: basename
  docs:
    mkdocs:
      enabled: false
runtime:
  python_bin: /storage/share/python/environments/Anaconda3/envs/rag/bin/python
